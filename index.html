<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>마요르카 방문 지도</title>
  <link rel="preconnect" href="https://unpkg.com">
  <style>
    :root{
      --bg:#fbfaf7; --card:#ffffff; --text:#222; --muted:#727272;
      --line:#3d3d3d; --empty:#f4f1e9; --visited:#86b89a; --hover:#d9eadf;
      --shadow:0 8px 28px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .card{background:var(--card);border:1px solid #e8e5de;border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
    header{display:flex;gap:14px;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #ece9e2;flex-wrap:wrap}
    h1{font-size:22px;margin:0}
    .sub{font-size:13px;color:var(--muted);margin-top:4px}
    .stats{display:flex;gap:10px;align-items:center}
    .pill{background:#f3f1eb;border-radius:999px;padding:9px 13px;font-size:14px;font-weight:700}
    button{border:0;border-radius:10px;padding:9px 12px;background:#ece9e2;cursor:pointer;font-weight:700}
    button:hover{filter:brightness(.97)}
    #status{padding:10px 20px;font-size:13px;color:var(--muted);background:#faf9f6;border-bottom:1px solid #ece9e2}
    #map{height:650px;background:#eef2f3}
    .municipality{fill:var(--empty);stroke:var(--line);stroke-width:1.2;cursor:pointer;transition:fill .16s ease}
    .municipality:hover{fill:var(--hover)}
    .municipality.visited{fill:var(--visited)}
    .label{font-size:11px;font-weight:700;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round}
    .legend{display:flex;gap:18px;align-items:center;padding:13px 20px;font-size:13px;border-top:1px solid #ece9e2;flex-wrap:wrap}
    .dot{width:14px;height:14px;border:1px solid #444;display:inline-block;vertical-align:-2px;margin-right:6px}
    .empty{background:var(--empty)} .done{background:var(--visited)}
    .tip{position:fixed;z-index:10;display:none;background:#222;color:#fff;padding:7px 9px;border-radius:7px;font-size:12px;pointer-events:none}
    @media(max-width:700px){#map{height:520px}.label{font-size:8px}h1{font-size:19px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <header>
      <div>
        <h1>🗺️ 마요르카 방문 지도</h1>
        <div class="sub">방문한 municipio를 클릭하면 색칠됩니다. 같은 브라우저에 자동 저장돼요.</div>
      </div>
      <div class="stats">
        <div class="pill"><span id="count">0</span> / 53 방문</div>
        <button id="reset">초기화</button>
      </div>
    </header>
    <div id="status">지도를 불러오는 중…</div>
    <svg id="map" viewBox="0 0 1000 650" role="img" aria-label="마요르카 자치구 방문 지도"></svg>
    <div class="legend">
      <span><i class="dot empty"></i>미방문</span>
      <span><i class="dot done"></i>방문</span>
      <span>지역을 다시 클릭하면 색이 해제됩니다.</span>
    </div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js"></script>
<script>
const MALLORCA = new Set([
"Alaró","Alcúdia","Algaida","Andratx","Ariany","Artà","Banyalbufar","Binissalem","Búger","Bunyola",
"Calvià","Campanet","Campos","Capdepera","Consell","Costitx","Deià","Escorca","Esporles","Estellencs",
"Felanitx","Fornalutx","Inca","Lloret de Vistalegre","Lloseta","Llubí","Llucmajor","Manacor","Mancor de la Vall",
"Maria de la Salut","Marratxí","Montuïri","Muro","Palma","Petra","Pollença","Porreres","Puigpunyent","Sa Pobla",
"Sant Joan","Sant Llorenç des Cardassar","Santa Eugènia","Santa Margalida","Santa Maria del Camí","Santanyí",
"Selva","Sencelles","Ses Salines","Sineu","Sóller","Son Servera","Valldemossa","Vilafranca de Bonany"
]);

const aliases = {
  "Palma de Mallorca":"Palma", "La Puebla":"Sa Pobla", "Puebla, Sa":"Sa Pobla",
  "Santa María del Camí":"Santa Maria del Camí", "Santa Maria del Cami":"Santa Maria del Camí",
  "San Lorenzo de Cardessar":"Sant Llorenç des Cardassar",
  "Sant Llorenç des Cardassar":"Sant Llorenç des Cardassar",
  "Villafranca de Bonany":"Vilafranca de Bonany",
  "María de la Salud":"Maria de la Salut",
  "Pollensa":"Pollença", "Sóller":"Sóller", "Soller":"Sóller"
};

const svg = d3.select("#map");
const statusEl = document.getElementById("status");
const countEl = document.getElementById("count");
const tip = document.getElementById("tip");
let visited = new Set(JSON.parse(localStorage.getItem("mallorcaVisited") || "[]"));

function normalizeName(n){
  const x=(n||"").trim();
  return aliases[x] || x;
}
function save(){
  localStorage.setItem("mallorcaVisited", JSON.stringify([...visited]));
  countEl.textContent = visited.size;
}
save();

document.getElementById("reset").onclick = () => {
  if(confirm("방문 표시를 전부 초기화할까요?")){
    visited.clear(); save();
    d3.selectAll(".municipality").classed("visited", false);
  }
};

async function loadMap(){
  const query = `[out:json][timeout:60];
  area["ISO3166-2"="ES-IB"][admin_level=4]->.searchArea;
  relation(area.searchArea)["boundary"="administrative"]["admin_level"="8"];
  out body; >; out skel qt;`;
  const endpoints = [
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter"
  ];

  let data, lastError;
  for(const endpoint of endpoints){
    try{
      const r = await fetch(endpoint, {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},
        body:"data="+encodeURIComponent(query)
      });
      if(!r.ok) throw new Error("HTTP "+r.status);
      data = await r.json();
      break;
    }catch(e){ lastError=e; }
  }
  if(!data) throw lastError || new Error("지도 데이터를 가져오지 못했습니다.");

  const geo = osmtogeojson(data);
  const features = geo.features.filter(f => {
    const p=f.properties||{};
    const name=normalizeName(p.name || (p.tags&&p.tags.name));
    f.properties.displayName=name;
    return MALLORCA.has(name) && (f.geometry.type==="Polygon" || f.geometry.type==="MultiPolygon");
  });

  // 중복 관계가 있을 경우 이름별 하나만 유지
  const byName = new Map();
  features.forEach(f => { if(!byName.has(f.properties.displayName)) byName.set(f.properties.displayName,f); });
  const cleaned = [...byName.values()];
  if(cleaned.length < 45) throw new Error(`자치구 경계를 충분히 찾지 못했습니다 (${cleaned.length}/53). 잠시 후 새로고침해 주세요.`);

  const fc={type:"FeatureCollection",features:cleaned};
  const projection=d3.geoMercator().fitExtent([[25,25],[975,625]],fc);
  const path=d3.geoPath(projection);

  svg.selectAll("*").remove();

  svg.selectAll("path")
    .data(cleaned)
    .join("path")
    .attr("class",d=>"municipality"+(visited.has(d.properties.displayName)?" visited":""))
    .attr("d",path)
    .on("click",function(event,d){
      const n=d.properties.displayName;
      visited.has(n)?visited.delete(n):visited.add(n);
      d3.select(this).classed("visited",visited.has(n));
      save();
    })
    .on("mousemove",(event,d)=>{
      tip.style.display="block";
      tip.style.left=(event.clientX+12)+"px";
      tip.style.top=(event.clientY+12)+"px";
      tip.textContent=d.properties.displayName;
    })
    .on("mouseleave",()=>tip.style.display="none");

  svg.selectAll("text")
    .data(cleaned)
    .join("text")
    .attr("class","label")
    .attr("transform",d=>`translate(${path.centroid(d)})`)
    .text(d=>d.properties.displayName);

  statusEl.textContent=`지도 준비 완료 · ${cleaned.length}개 자치구 표시`;
  save();
}

loadMap().catch(err=>{
  console.error(err);
  statusEl.textContent="⚠️ "+err.message;
  svg.append("text").attr("x",500).attr("y",310).attr("text-anchor","middle").attr("font-size",18)
    .text("지도를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.");
});
</script>
</body>
</html>
