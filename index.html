<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>마요르카 방문 지도</title>
<style>
:root{--bg:#faf9f6;--card:#fff;--text:#202124;--muted:#6f6f6f;--line:#444;--empty:#eef2f0;--visited:#8fc6a4;--hover:#cfe8d8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
.wrap{max-width:1100px;margin:auto;padding:14px}.card{background:#fff;border:1px solid #e5e2dc;border-radius:18px;overflow:hidden}
header{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid #ece9e3;flex-wrap:wrap}
h1{font-size:24px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:5px}.actions{display:flex;gap:10px;align-items:center}
.count{font-weight:800;background:#f3f1ec;border-radius:999px;padding:10px 14px}button{border:0;border-radius:11px;padding:10px 14px;font-weight:750;cursor:pointer;background:#ebe8e2}
#status{padding:10px 22px;font-size:13px;color:var(--muted);border-bottom:1px solid #ece9e3}
#map{display:block;width:100%;height:auto;background:#f3f7f7}.region{fill:var(--empty);stroke:var(--line);stroke-width:.8;vector-effect:non-scaling-stroke;cursor:pointer;transition:fill .15s}
.region:hover{fill:var(--hover)}.region.visited{fill:var(--visited)}.label{font-size:8px;font-weight:700;text-anchor:middle;pointer-events:none;paint-order:stroke;stroke:#fff;stroke-width:2.6px;stroke-linejoin:round}
.legend{display:flex;gap:18px;flex-wrap:wrap;padding:12px 22px;border-top:1px solid #ece9e3;font-size:13px}.sw{width:13px;height:13px;border:1px solid #555;display:inline-block;vertical-align:-2px;margin-right:6px}
.tip{display:none;position:fixed;z-index:9;background:#222;color:#fff;padding:7px 9px;border-radius:7px;font-size:12px;pointer-events:none}
@media(max-width:650px){.wrap{padding:0}.card{border-radius:0}.label{font-size:6px}h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<header><div><h1>🗺️ 마요르카 방문 지도</h1><div class="sub">방문한 지역을 클릭하면 색칠되고 이 브라우저에 자동 저장됩니다.</div></div>
<div class="actions"><div class="count"><span id="count">0</span> / 53 방문</div><button id="reset">초기화</button></div></header>
<div id="status">지도를 불러오는 중…</div>
<svg id="map" viewBox="0 0 1000 650" aria-label="마요르카 53개 자치구 지도"></svg>
<div class="legend"><span><i class="sw" style="background:var(--empty)"></i>미방문</span><span><i class="sw" style="background:var(--visited)"></i>방문</span><span>다시 클릭하면 해제됩니다.</span></div>
</div></div><div class="tip" id="tip"></div>

<script>
const DATA_URLS=[
"https://media.githubusercontent.com/media/wmgeolab/geoBoundaries/9469f09/releaseData/gbOpen/ESP/ADM3/geoBoundaries-ESP-ADM3_simplified.geojson",
"https://raw.githubusercontent.com/wmgeolab/geoBoundaries/9469f09/releaseData/gbOpen/ESP/ADM3/geoBoundaries-ESP-ADM3_simplified.geojson"
];
const OFFICIAL=new Set(["Alaró","Alcúdia","Algaida","Andratx","Ariany","Artà","Banyalbufar","Binissalem","Búger","Bunyola","Calvià","Campanet","Campos","Capdepera","Consell","Costitx","Deià","Escorca","Esporles","Estellencs","Felanitx","Fornalutx","Inca","Lloret de Vistalegre","Lloseta","Llubí","Llucmajor","Manacor","Mancor de la Vall","Maria de la Salut","Marratxí","Montuïri","Muro","Palma","Petra","Pollença","Porreres","Puigpunyent","Sa Pobla","Sant Joan","Sant Llorenç des Cardassar","Santa Eugènia","Santa Margalida","Santa Maria del Camí","Santanyí","Selva","Sencelles","Ses Salines","Sineu","Sóller","Son Servera","Valldemossa","Vilafranca de Bonany"]);
const ALIAS={"Palma de Mallorca":"Palma","La Puebla":"Sa Pobla","Puebla (Sa)":"Sa Pobla","Pollensa":"Pollença","Soller":"Sóller","María de la Salud":"Maria de la Salut","Santa María del Camí":"Santa Maria del Camí","Villafranca de Bonany":"Vilafranca de Bonany","San Lorenzo de Cardessar":"Sant Llorenç des Cardassar","San Juan":"Sant Joan","Las Salinas":"Ses Salines","Montuiri":"Montuïri","Marratxi":"Marratxí","Buger":"Búger","Alcudia":"Alcúdia","Arta":"Artà","Calvia":"Calvià","Deia":"Deià","Llubi":"Llubí","Santanyi":"Santanyí"};
const svg=document.getElementById("map"),statusEl=document.getElementById("status"),countEl=document.getElementById("count"),tip=document.getElementById("tip");
let visited=new Set(JSON.parse(localStorage.getItem("mallorcaVisited")||"[]"));
function save(){localStorage.setItem("mallorcaVisited",JSON.stringify([...visited]));countEl.textContent=visited.size} save();
document.getElementById("reset").onclick=()=>{if(confirm("모든 방문 표시를 초기화할까요?")){visited.clear();save();document.querySelectorAll(".region").forEach(x=>x.classList.remove("visited"))}};
const norm=s=>(ALIAS[(s||"").trim()]||(s||"").trim());
const key=s=>norm(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()
 .replace(/\b(de|del|des|la|las|el|els|sa|ses|san|sant|santa)\b/g,"")
 .replace(/[^a-z0-9]/g,"");
function lev(a,b){
 const m=Array.from({length:a.length+1},(_,i)=>[i]);
 for(let j=1;j<=b.length;j++)m[0][j]=j;
 for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
  m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
 return m[a.length][b.length];
}
function allCoords(g){let out=[];const walk=x=>{if(typeof x[0]==="number")out.push(x);else x.forEach(walk)};walk(g.coordinates);return out}
function centroid(g){const a=allCoords(g);return [a.reduce((s,p)=>s+p[0],0)/a.length,a.reduce((s,p)=>s+p[1],0)/a.length]}
function pathData(g,project){const poly=r=>r.map((p,i)=>(i?"L":"M")+project(p).join(",")).join("")+"Z";if(g.type==="Polygon")return g.coordinates.map(poly).join("");return g.coordinates.flatMap(p=>p.map(poly)).join("")}
async function main(){
 try{
  let geo=null,lastErr=null;
  for(const url of DATA_URLS){
    try{
      const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),60000);
      const r=await fetch(url,{signal:ctrl.signal});clearTimeout(timer);
      if(!r.ok)throw Error("HTTP "+r.status);
      const text=await r.text();
      if(text.trim().startsWith("version https://git-lfs.github.com/spec")) throw Error("Git LFS pointer");
      geo=JSON.parse(text);
      break;
    }catch(err){lastErr=err}
  }
  if(!geo)throw lastErr||Error("지도 데이터를 가져오지 못했습니다");
  // 이름 표기가 달라도 좌표상 마요르카에 있는 municipio 53개를 먼저 선택합니다.
  const island=(geo.features||[]).filter(f=>{
    const c=centroid(f.geometry);
    return c[0]>2.25 && c[0]<3.60 && c[1]>39.20 && c[1]<40.15;
  });
  if(island.length<53) throw Error(`마요르카 경계가 ${island.length}개만 확인됨`);

  const official=[...OFFICIAL], unused=new Set(official), features=[];
  for(const f of island){
    const p=f.properties||{};
    const raw=norm(p.shapeName||p.NAMEUNIT||p.name||p.NAME_3||"");
    let chosen=null;
    // 1) 정확/정규화 일치
    for(const o of unused){ if(key(o)===key(raw)){chosen=o;break;} }
    // 2) 철자 차이는 가장 가까운 공식 명칭으로 자동 연결
    if(!chosen){
      let best=null,score=Infinity;
      for(const o of unused){const d=lev(key(o),key(raw));if(d<score){score=d;best=o}}
      if(score<=5) chosen=best;
    }
    if(chosen){f.properties.displayName=chosen;unused.delete(chosen);features.push(f)}
  }
  if(features.length!==53){
    throw Error(`53개 중 ${features.length}개 연결됨${unused.size? " · 누락: "+[...unused].join(", "):""}`);
  }
  const coords=features.flatMap(f=>allCoords(f.geometry)),xs=coords.map(p=>p[0]),ys=coords.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),pad=28;
  const scale=Math.min((1000-2*pad)/(maxX-minX),(650-2*pad)/(maxY-minY));
  const project=([x,y])=>[pad+(x-minX)*scale,650-pad-(y-minY)*scale];
  svg.innerHTML="";
  for(const f of features){
   const n=f.properties.displayName,ns="http://www.w3.org/2000/svg";
   const p=document.createElementNS(ns,"path");p.setAttribute("d",pathData(f.geometry,project));p.setAttribute("class","region"+(visited.has(n)?" visited":""));
   p.onclick=()=>{visited.has(n)?visited.delete(n):visited.add(n);p.classList.toggle("visited",visited.has(n));save()};
   p.onmousemove=e=>{tip.style.display="block";tip.style.left=e.clientX+12+"px";tip.style.top=e.clientY+12+"px";tip.textContent=n};p.onmouseleave=()=>tip.style.display="none";svg.appendChild(p);
   const c=project(centroid(f.geometry)),t=document.createElementNS(ns,"text");t.setAttribute("x",c[0]);t.setAttribute("y",c[1]);t.setAttribute("class","label");t.textContent=n;svg.appendChild(t);
  }
  statusEl.textContent="지도 준비 완료 · 마요르카 공식 53개 municipio";
 }catch(e){console.error(e);statusEl.textContent="⚠️ 지도 로딩 실패: "+e.message+" · 잠시 후 새로고침해 주세요."}
}
main();
</script>
</body></html>
